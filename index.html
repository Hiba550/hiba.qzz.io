<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta
      name="description"
      content="Hiba - a quiet personal page for an independent developer building on the internet."
    >
    <title>Hiba</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <canvas class="ambient-canvas" data-ambient aria-hidden="true"></canvas>
    <div class="pointer-light" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>
    <div class="cursor-ring" data-cursor-ring aria-hidden="true"></div>
    <div class="cursor-dot" data-cursor-dot aria-hidden="true"></div>

    <div class="tab-row" role="tablist" aria-label="Page sections">
      <button class="tab-button is-active" type="button" role="tab" aria-selected="true" data-tab="home">
        home
      </button>
      <button class="tab-button" type="button" role="tab" aria-selected="false" data-tab="photos">
        photos
      </button>
    </div>

    <main class="page-shell">
      <section class="hero" data-hero aria-labelledby="hiba-title">
        <h1 class="hero-title" id="hiba-title" aria-label="Hiba">
          <span>H</span><span>i</span><span>b</span><span>a</span>
        </h1>

        <div class="identity" aria-label="Basic details">
          <span>19 years old</span>
          <span>Born <time datetime="2006-10-03">03/10/2006</time></span>
        </div>

        <div class="copy-stack">
          <p class="lead">somewhere between silence and obsession</p>
          <p class="quiet-line">i build stuff on the internet, kinda quietly.</p>
          <p class="scale-line">somehow, millions reached.</p>
        </div>

        <a
          class="hire-button"
          href="mailto:hibajiyath5@gmail.com?subject=Project%20with%20Hiba"
          aria-label="Hire Hiba by email"
        >
          <span>HIRE ME</span>
        </a>

          <a
            class="social-link"
            href="https://github.com/hiba550"
            target="_blank"
            rel="noreferrer"

            href="#x"
            aria-label="X or Twitter"
            data-label="X"

          <a
            class="social-link"
            href="mailto:hibajiyath5@gmail.com"
            aria-label="Email"
            data-label="Email"

      </section>
    </main>

    <section class="photo-view" data-photo-view aria-label="Photos" hidden>
      <figure class="photo-card">
        <img
          src="assets/batman.jpg"
          alt="Robert Pattinson as Batman in the full suit"
        >
      </figure>
    </section>

    <p class="toast" data-toast role="status" aria-live="polite"></p>

    <footer class="corner-note" aria-label="Personal note">
      <span>-</span>
      <span></span>
      <span>still becoming</span>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
